name: Weekly Techno Update

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --break-system-packages

      - name: Scrape and update
        run: python3 scraper.py

      - name: Commit and push
        run: |
          git config user.name "techno-bot"
          git config user.email "techno-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Weekly update $(date +'%Y-%m-%d')"
          git push
